<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First HTML Page</title>
</head>
<body>

    <header>
        <h1>Pokemon</h1>
        <nav>
            <a href="#about">About</a> |
            <a href="#skills">Skills</a> |
            <a href="#contact">Contact</a>
        </nav>
    </header>

    <main>

        <section id="about">
            <h2>About Me</h2>
            <p>
                I am learning web development using
                <strong>HTML</strong>, <em>CSS</em>, and JavaScript.
            </p>
            <img src="ash.png" alt="My Profile Photo" width="200">
        </section>

        <section id="skills">
            <h2>Skills</h2>

            <h3>Programming Languages</h3>
            <ul>
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ul>

            <h3>Learning Progress</h3>
            <table border="1">
                <tr>
                    <th>Technology</th>
                    <th>Level</th>
                </tr>
                <tr>
                    <td>HTML</td>
                    <td>Beginner</td>
                </tr>
                <tr>
                    <td>CSS</td>
                    <td>Beginner</td>
                </tr>
            </table>
        </section>

        <section id="contact">
            <h2>Contact Me</h2>

            <form>
                <label>Name:</label><br>
                <input type="text" name="name"><br><br>

                <label>Email:</label><br>
                <input type="email" name="email"><br><br>

                <label>Message:</label><br>
                <textarea name="message"></textarea><br><br>

                <button type="submit">Send</button>
            </form>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 My Portfolio</p>
    </footer>

</body>
</html>
